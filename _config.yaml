# site properties and page defaults

title: HelSi Lab
subtitle: Healthcare & Simulation Optimization · Incheon National University
description: HelSi Lab at Incheon National University develops simulation, optimization, and digital-twin methods for healthcare, infectious disease, and bioprocess systems. PI Serin Lee.
logo-text: true
header-dark: true
footer-dark: true
proofer: false

links:
  # email: serinlee@inu.ac.kr
  github: HelSi-Lab
  # Fill these in if available, otherwise delete the line:
  # orcid: 0000-0000-0000-0000
  # google-scholar: XXXXXXXX
  # github: your-github


# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each post
  posts:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff

# configure jekyll spaceship
jekyll-spaceship:
  mathjax-processor:
    src:
      - https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js
